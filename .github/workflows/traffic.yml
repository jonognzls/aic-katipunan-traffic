name: Katipunan Traffic Data Collection

on:
  workflow_dispatch:          # triggered by cron-job.org every 5 minutes

jobs:
  collect-traffic:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # kill if it hangs (stays under 5-min window)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Write service account credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Run traffic collector
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: python final-realtime-traffic-data.py
